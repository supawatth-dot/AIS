services:
  - type: web
    name: ais-app
    runtime: node
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/ais.db
    disk:
      name: ais-data
      mountPath: /data
      sizeGB: 1
